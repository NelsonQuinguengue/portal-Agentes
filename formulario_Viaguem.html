<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Vistoria Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bibliotecas de IA para reconhecimento em tempo real -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        .step { display: none; }
        .step.active { display: block; }
        #cameraOverlay { display: none; }
        .scanning-line {
            height: 2px;
            background: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 15px 5px rgba(59, 130, 246, 0.5);
            position: absolute;
            width: 100%;
            animation: scan 2s infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans overflow-x-hidden">

    <div class="max-w-md mx-auto min-h-screen flex flex-col relative">
        
        <!-- Header -->
        <header class="p-6 bg-slate-800 border-b border-slate-700">
            <h1 class="text-xl font-bold">Vistoria Inteligente</h1>
            <div class="w-full bg-slate-700 h-1 mt-4 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-blue-500 h-full transition-all duration-500" style="width: 20%"></div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow p-6">
            
            <!-- PASSO 1: DADOS -->
            <section id="step1" class="step active">
                <h2 class="text-lg mb-4">Dados do Veículo</h2>
                <input type="text" id="input_matricula" placeholder="Matrícula" class="w-full bg-slate-800 border border-slate-600 p-4 rounded-xl mb-4 uppercase">
                <button onclick="nextStep(2)" class="w-full bg-blue-600 p-4 rounded-xl font-bold">Próximo</button>
            </section>

            <!-- PASSO 2: CAPTURAS -->
            <section id="step2" class="step">
                <h2 class="text-lg mb-4">Capturas Necessárias</h2>
                <div class="grid grid-cols-1 gap-4">
                    <button id="btn-frente" onclick="openCamera('frente', 'Carro/Frente')" class="flex items-center justify-between bg-slate-800 p-5 rounded-2xl border border-slate-700 hover:border-blue-500">
                        <span>Frente do Veículo</span>
                        <span class="status-icon">⚪</span>
                    </button>
                    <button id="btn-matricula" onclick="openCamera('matricula', 'Matrícula')" class="flex items-center justify-between bg-slate-800 p-5 rounded-2xl border border-slate-700">
                        <span>Matrícula Visível</span>
                        <span class="status-icon">⚪</span>
                    </button>
                    <button id="btn-motor" onclick="openCamera('motor', 'Compartimento Motor')" class="flex items-center justify-between bg-slate-800 p-5 rounded-2xl border border-slate-700">
                        <span>Motor</span>
                        <span class="status-icon">⚪</span>
                    </button>
                </div>
                <button onclick="verifyAndReview()" class="w-full mt-10 bg-blue-600 p-4 rounded-xl font-bold">Revisar e Enviar</button>
            </section>

            <!-- PASSO 3: REVISÃO FINAL -->
            <section id="step3" class="step">
                <h2 class="text-lg mb-4 text-green-400">Revisão de Dados</h2>
                <div id="reviewContainer" class="space-y-4 mb-6"></div>
                <button onclick="finalSubmit()" class="w-full bg-green-600 p-4 rounded-xl font-bold">Confirmar Envio Final</button>
                <button onclick="nextStep(2)" class="w-full mt-2 text-slate-400">Voltar para corrigir</button>
            </section>
        </main>

        <!-- CAMERA OVERLAY (INTERFACE DE CAPTURA) -->
        <div id="cameraOverlay" class="fixed inset-0 bg-black z-50 flex flex-col">
            <div class="p-4 flex justify-between items-center bg-black/50 text-white">
                <span id="cameraTarget">Aponte para: Frente</span>
                <button onclick="closeCamera()" class="p-2">✖</button>
            </div>
            
            <div class="relative flex-grow flex items-center justify-center overflow-hidden">
                <video id="webcam" autoplay playsinline class="w-full h-full object-cover"></video>
                <div class="scanning-line"></div>
                <!-- Guia Visual -->
                <div class="absolute border-2 border-white/30 rounded-lg w-72 h-48 pointer-events-none shadow-[0_0_0_9999px_rgba(0,0,0,0.5)]"></div>
                
                <!-- Feedback IA -->
                <div id="aiLabel" class="absolute bottom-10 bg-blue-600 px-4 py-2 rounded-full text-sm font-bold animate-pulse">
                    Analisando imagem...
                </div>
            </div>

            <div class="p-8 bg-black flex justify-center">
                <button id="captureBtn" disabled class="w-20 h-20 bg-slate-600 rounded-full border-4 border-white disabled:opacity-30" onclick="takePhoto()">
                    <div class="w-full h-full rounded-full flex items-center justify-center text-2xl">📸</div>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let model = null;
        let stream = null;
        let currentTarget = "";
        let captures = { frente: null, matricula: null, motor: null };

        // Carregar o modelo de IA ao iniciar
        async function loadModel() {
            model = await mobilenet.load();
            document.getElementById('aiLabel').innerText = "IA Pronta";
        }
        loadModel();

        function nextStep(s) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
            document.getElementById('progressBar').style.width = (s * 33) + '%';
        }

        async function openCamera(targetId, targetLabel) {
            currentTarget = targetId;
            document.getElementById('cameraTarget').innerText = "Aponte para: " + targetLabel;
            document.getElementById('cameraOverlay').style.display = 'flex';
            
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, 
                audio: false 
            });
            const video = document.getElementById('webcam');
            video.srcObject = stream;

            // Iniciar análise de imagem
            detectFrame(video);
        }

        async function detectFrame(video) {
            if (!stream) return;
            const predictions = await model.classify(video);
            const aiLabel = document.getElementById('aiLabel');
            const captureBtn = document.getElementById('captureBtn');

            // Lógica de Reconhecimento
            // (Em produção, você mapearia classes específicas como "grille" para frente do carro)
            const topPrediction = predictions[0].className.toLowerCase();
            aiLabel.innerText = "Detectado: " + topPrediction;

            // Simulação de validação inteligente:
            // Se o alvo for 'frente', a IA deve reconhecer partes de 'car' ou 'grille'
            if (topPrediction.includes('car') || topPrediction.includes('vehicle') || topPrediction.includes('wheel')) {
                aiLabel.classList.replace('bg-blue-600', 'bg-green-600');
                captureBtn.disabled = false;
                captureBtn.classList.replace('bg-slate-600', 'bg-blue-600');
            } else {
                aiLabel.classList.replace('bg-green-600', 'bg-blue-600');
                captureBtn.disabled = true;
                captureBtn.classList.replace('bg-blue-600', 'bg-slate-600');
            }

            requestAnimationFrame(() => detectFrame(video));
        }

        function takePhoto() {
            const video = document.getElementById('webcam');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            captures[currentTarget] = canvas.toDataURL('image/jpeg');
            
            // Marcar como concluído na lista
            document.getElementById('btn-' + currentTarget).querySelector('.status-icon').innerText = '✅';
            document.getElementById('btn-' + currentTarget).classList.add('border-green-500');
            
            closeCamera();
        }

        function closeCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            document.getElementById('cameraOverlay').style.display = 'none';
        }

        function verifyAndReview() {
            // Verificar se falta alguma foto
            const missing = Object.keys(captures).filter(key => captures[key] === null);
            
            if (missing.length > 0) {
                alert("Atenção! Faltam as seguintes capturas: " + missing.join(", "));
                return;
            }

            // Gerar Revisão
            const container = document.getElementById('reviewContainer');
            container.innerHTML = `<p><strong>Matrícula:</strong> ${document.getElementById('input_matricula').value}</p>`;
            
            Object.keys(captures).forEach(key => {
                container.innerHTML += `
                    <div class="flex items-center gap-4 bg-slate-800 p-2 rounded-lg">
                        <img src="${captures[key]}" class="w-20 h-20 object-cover rounded-md">
                        <span class="capitalize">${key}</span>
                    </div>
                `;
            });

            nextStep(3);
        }

        function finalSubmit() {
            alert("Enviando para os Engenheiros Nelson e Emanuel...\n[Simulação de Upload concluída]");
            location.reload();
        }
    </script>
</body>
</html>
