<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistoria 360 Pro | Nelson & Emanuel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        .step { display: none; }
        .step.active { display: flex; flex-direction: column; }
        #cameraOverlay { display: none; }
        .mask-overlay {
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        @keyframes scan { 0% { top: 10%; } 100% { top: 90%; } }
        .scanner-line { animation: scan 2s linear infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        <!-- HEADER -->
        <header class="p-6 bg-slate-900 border-b border-slate-800 sticky top-0 z-20">
            <div class="flex justify-between items-center mb-2">
                <span class="text-blue-400 font-bold tracking-tighter text-xl">STAS <span class="text-white">AUTO</span></span>
                <span id="progressText" class="text-xs font-mono">0/10 CONCLUÍDO</span>
            </div>
            <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-blue-500 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </header>

        <main class="flex-grow p-6">
            <!-- PASSO 1: IDENTIFICAÇÃO -->
            <section id="step1" class="step active space-y-4">
                <div class="bg-blue-900/20 p-4 rounded-2xl border border-blue-500/30 mb-4 text-sm text-blue-200">
                    Preencha os dados do tomador para desbloquear a câmera.
                </div>
                <input type="text" id="tomador" placeholder="Nome do Tomador" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none focus:border-blue-500 transition-all">
                <input type="text" id="matricula_val" placeholder="Matrícula" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none focus:border-blue-500 uppercase">
                <button onclick="nextStep(2)" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold text-lg shadow-lg shadow-blue-900/20 transition-all active:scale-95">Iniciar Vistoria Digital</button>
            </section>

            <!-- PASSO 2: CHECKLIST DE CAPTURAS -->
            <section id="step2" class="step">
                <h3 class="text-sm font-bold text-slate-500 uppercase mb-4 tracking-widest">Registos Obrigatórios</h3>
                <div class="space-y-3" id="checklist">
                    <!-- Gerado via JS -->
                </div>
                <button id="btnReview" onclick="showReview()" class="w-full mt-8 bg-slate-800 border border-slate-700 text-slate-400 py-4 rounded-xl font-bold opacity-50 cursor-not-allowed transition-all">Revisar Envio</button>
            </section>

            <!-- PASSO 3: REVISÃO E ENVIO -->
            <section id="step3" class="step">
                <h3 class="text-lg font-bold mb-4">Confirmar Capturas</h3>
                <div id="reviewGrid" class="grid grid-cols-2 gap-3 mb-8"></div>
                <button onclick="finalUpload()" class="w-full bg-green-600 py-4 rounded-xl font-bold text-lg">Submeter para Validação</button>
            </section>
        </main>

        <!-- CAMERA OVERLAY UI -->
        <div id="cameraOverlay" class="fixed inset-0 bg-black z-50 flex flex-col">
            <div class="absolute top-0 w-full p-6 bg-gradient-to-b from-black/80 to-transparent flex justify-between items-start z-10">
                <div>
                    <h4 id="targetTitle" class="font-bold text-white uppercase text-sm tracking-widest">Frente do Veículo</h4>
                    <p id="targetInstr" class="text-xs text-slate-300">Enquadre a frente inteira de forma nítida</p>
                </div>
                <button onclick="closeCamera()" class="bg-white/10 p-2 rounded-full backdrop-blur-md">✕</button>
            </div>

            <div class="relative flex-grow flex items-center justify-center overflow-hidden bg-slate-900">
                <video id="webcam" autoplay playsinline class="w-full h-full object-cover"></video>
                
                <!-- Máscaras de enquadramento -->
                <div id="carMask" class="mask-overlay absolute w-4/5 h-1/2 rounded-3xl pointer-events-none">
                    <div class="scanner-line absolute w-full h-0.5 bg-blue-400 shadow-[0_0_15px_blue]"></div>
                </div>

                <div id="aiFeedback" class="absolute bottom-32 bg-black/60 backdrop-blur-md px-6 py-2 rounded-full border border-white/20 text-xs font-mono">
                    Aguardando visão nítida...
                </div>
            </div>

            <div class="p-10 bg-black flex flex-col items-center gap-4">
                <button id="captureBtn" disabled class="w-20 h-20 bg-slate-800 rounded-full border-4 border-white flex items-center justify-center disabled:opacity-20 transition-all" onclick="takeSnapshot()">
                    <div class="w-16 h-16 bg-white rounded-full scale-90 hover:scale-100 transition-transform"></div>
                </button>
                <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Captura em tempo real</span>
            </div>
        </div>
    </div>

    <script>
        const tasks = [
            { id: 'frente', label: 'Frente do Veículo', instr: 'Capture a dianteira completa' },
            { id: 'traseira', label: 'Traseira', instr: 'Capture a traseira e matrícula' },
            { id: 'lat_dir', label: 'Lateral Direita', instr: 'Capture todo o lado direito' },
            { id: 'lat_esq', label: 'Lateral Esquerda', instr: 'Capture todo o lado esquerdo' },
            { id: 'interior', label: 'Interior (Painel/Bancos)', instr: 'Visão geral da cabine' },
            { id: 'instrumentos', label: 'Painel Ligado', instr: 'Mostre km e luzes do painel' },
            { id: 'vin', label: 'Número de Chassis (VIN)', instr: 'Foque na gravação do chassis' },
            { id: 'matricula', label: 'Matrícula', instr: 'Foto de proximidade da placa' },
            { id: 'motor', label: 'Compartimento Motor', instr: 'Foto do motor aberto' },
            { id: 'video_360', label: 'Vídeo 360º', instr: 'Gire ao redor do carro (Vídeo)', isVideo: true }
        ];

        let captures = {};
        let currentTaskId = null;
        let stream = null;
        let net = null;

        async function init() {
            renderChecklist();
            net = await mobilenet.load();
        }
        init();

        function renderChecklist() {
            const container = document.getElementById('checklist');
            container.innerHTML = tasks.map(t => `
                <div id="row-${t.id}" onclick="openCamera('${t.id}')" class="group flex items-center justify-between bg-slate-900 border border-slate-800 p-4 rounded-2xl hover:border-blue-500 transition-all cursor-pointer">
                    <div class="flex items-center gap-3">
                        <div class="indicator w-2 h-2 rounded-full bg-slate-700"></div>
                        <span class="text-sm font-medium text-slate-300 group-hover:text-white">${t.label}</span>
                    </div>
                    <span class="status-text text-[10px] font-bold text-slate-600 uppercase">Pendente</span>
                </div>
            `).join('');
        }

        function nextStep(s) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
        }

        async function openCamera(id) {
            const task = tasks.find(t => t.id === id);
            currentTaskId = id;
            document.getElementById('targetTitle').innerText = task.label;
            document.getElementById('targetInstr').innerText = task.instr;
            document.getElementById('cameraOverlay').style.display = 'flex';
            
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('webcam').srcObject = stream;
            
            runAI();
        }

        async function runAI() {
            if (!stream) return;
            const video = document.getElementById('webcam');
            const feedback = document.getElementById('aiFeedback');
            const btn = document.getElementById('captureBtn');

            try {
                const predictions = await net.classify(video);
                const top = predictions[0];
                feedback.innerText = `ANALISANDO: ${(top.probability * 100).toFixed(0)}% NÍTIDO`;
                
                // Lógica de validação: Se a probabilidade for > 15% (Mobilenet é genérico), habilita
                if (top.probability > 0.15) {
                    btn.disabled = false;
                    btn.classList.add('border-green-400');
                }
            } catch (e) {}

            if (stream) requestAnimationFrame(runAI);
        }

        function takeSnapshot() {
            const video = document.getElementById('webcam');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            captures[currentTaskId] = canvas.toDataURL('image/jpeg');
            updateChecklist(currentTaskId);
            closeCamera();
            checkCompletion();
        }

        function updateChecklist(id) {
            const row = document.getElementById('row-' + id);
            row.classList.add('border-green-500/50', 'bg-green-500/5');
            row.querySelector('.indicator').classList.replace('bg-slate-700', 'bg-green-500');
            row.querySelector('.status-text').innerText = 'Capturado';
            row.querySelector('.status-text').classList.replace('text-slate-600', 'text-green-500');
        }

        function checkCompletion() {
            const count = Object.keys(captures).length;
            const total = tasks.length;
            document.getElementById('progressBar').style.width = (count / total * 100) + '%';
            document.getElementById('progressText').innerText = `${count}/${total} CONCLUÍDO`;
            
            if (count === total) {
                const btn = document.getElementById('btnReview');
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.classList.add('bg-blue-600', 'text-white', 'opacity-100');
                btn.disabled = false;
            }
        }

        function showReview() {
            const grid = document.getElementById('reviewGrid');
            grid.innerHTML = tasks.map(t => `
                <div class="relative group">
                    <img src="${captures[t.id]}" class="w-full h-32 object-cover rounded-xl border border-slate-700">
                    <div class="absolute bottom-0 w-full bg-black/60 p-2 rounded-b-xl text-[8px] uppercase font-bold text-white">${t.label}</div>
                    <button onclick="openCamera('${t.id}')" class="absolute top-1 right-1 bg-blue-600 p-1 rounded-md text-[8px]">Refazer</button>
                </div>
            `).join('');
            nextStep(3);
        }

        function closeCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            stream = null;
            document.getElementById('cameraOverlay').style.display = 'none';
        }

        function finalUpload() {
            alert("Vistoria enviada! O Eng. Sandro Cardoso receberá as capturas nítidas em instantes.");
            location.reload();
        }
    </script>
</body>
</html>
