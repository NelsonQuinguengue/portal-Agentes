<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistoria Pro | Versão Estável</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        .step { display: none; }
        .step.active { display: flex; flex-direction: column; }
        #cameraOverlay, #previewModal { display: none; }
        .recording { animation: pulse-red 1s infinite; background-color: #ef4444 !important; border-radius: 8px !important; }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-slate-950 shadow-2xl border-x border-slate-900">
        
        <!-- HEADER -->
        <header class="p-6 bg-slate-900/80 backdrop-blur border-b border-slate-800 sticky top-0 z-30">
            <div class="flex justify-between items-center mb-4">
                <h1 class="font-black text-blue-500 italic">AUTO<span class="text-white font-light">CHECK</span></h1>
                <div id="statusBadge" class="text-[10px] bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20 font-bold">SISTEMA ATIVO</div>
            </div>
            <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-blue-600 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </header>

        <main class="flex-grow p-6">
            <!-- PASSO 1: DADOS -->
            <section id="step1" class="step active space-y-6">
                <div class="space-y-4">
                    <h2 class="text-xl font-bold">Dados do Veículo</h2>
                    <input type="text" id="tomador" placeholder="Nome do Tomador" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl focus:border-blue-500 outline-none">
                      <input type="text" id="telefone" placeholder="Telefone" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl focus:border-blue-500 outline-none">
                    <input type="text" id="matricula" placeholder="Matrícula" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl focus:border-blue-500 outline-none uppercase">
                </div>
                <button onclick="checkStep1()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg">Próximo</button>
            </section>

            <!-- PASSO 2: CHECKLIST -->
            <section id="step2" class="step">
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-xl font-bold">Capturas</h2>
                    <span id="counter" class="text-blue-500 font-mono text-sm">0/10</span>
                </div>
                <div id="checklist" class="grid grid-cols-1 gap-3"></div>
                
                <div id="submitArea" class="hidden mt-8">
                    <button onclick="renderReview()" class="w-full bg-green-600 py-4 rounded-2xl font-black">REVISAR E FINALIZAR</button>
                </div>
            </section>

            <!-- PASSO 3: REVISÃO -->
            <section id="step3" class="step">
                <h2 class="text-xl font-bold mb-6">Revisão Final</h2>
                <div id="reviewGrid" class="grid grid-cols-2 gap-3 mb-8"></div>
                <button onclick="location.reload()" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-xl">ENVIAR VISTORIA</button>
            </section>
        </main>

        <!-- CAMERA OVERLAY -->
        <div id="cameraOverlay" class="fixed inset-0 bg-black z-50 flex flex-col">
            <div class="p-6 flex justify-between items-start z-10 bg-gradient-to-b from-black to-transparent">
                <div>
                    <h3 id="camLabel" class="text-white font-bold uppercase text-xs">Captura</h3>
                    <p id="aiStatus" class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Iniciando Sensor...</p>
                </div>
                <button onclick="closeCam()" class="text-3xl text-white/50">&times;</button>
            </div>
            
            <div class="relative flex-grow flex items-center justify-center bg-slate-950 overflow-hidden">
                <video id="webcam" autoplay playsinline muted class="w-full h-full object-cover"></video>
                <div class="absolute inset-0 border-[40px] border-black/40 pointer-events-none flex items-center justify-center">
                    <div class="w-full h-64 border-2 border-white/20 border-dashed rounded-3xl"></div>
                </div>
            </div>

            <div class="p-10 bg-black flex flex-col items-center gap-4">
                <div id="timer" class="hidden text-red-500 font-mono text-2xl font-bold mb-2 tracking-tighter">00:00</div>
                <button id="actionBtn" onclick="handleAction()" class="w-20 h-20 bg-white rounded-full border-4 border-slate-700 flex items-center justify-center transition-all active:scale-90">
                    <div id="btnCore" class="w-14 h-14 bg-slate-200 rounded-full transition-all"></div>
                </button>
                <span id="instructionText" class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Toque para Capturar</span>
            </div>
        </div>

        <!-- PREVIEW MODAL -->
        <div id="previewModal" class="fixed inset-0 bg-black/95 z-[60] flex flex-col p-6">
            <div class="flex justify-end mb-4">
                <button onclick="closePreview()" class="text-4xl text-white">&times;</button>
            </div>
            <div id="previewContent" class="flex-grow flex items-center justify-center rounded-2xl overflow-hidden bg-slate-900"></div>
            <button onclick="closePreview()" class="mt-6 w-full bg-white text-black py-4 rounded-xl font-bold">Fechar</button>
        </div>
    </div>

    <script>
        const config = [
            {id: 'frente', label: 'Frente', isVideo: false},
            {id: 'traseira', label: 'Traseira', isVideo: false},
            {id: 'lat_dir', label: 'Lateral Direita', isVideo: false},
            {id: 'lat_esq', label: 'Lateral Esquerda', isVideo: false},
            {id: 'interior', label: 'Interior', isVideo: false},
            {id: 'painel', label: 'Painel Ligado', isVideo: false},
            {id: 'chassis', label: 'Chassis (VIN)', isVideo: false},
            {id: 'matricula_detalhe', label: 'Matrícula', isVideo: false},
            {id: 'motor_capo', label: 'Motor', isVideo: false},
            {id: 'video_360', label: 'Vídeo 360º', isVideo: true}
        ];

        let data = {};
        let current = null;
        let stream = null;
        let recorder = null;
        let chunks = [];
        let model = null;
        let timerInterval = null;

        async function init() {
            const list = document.getElementById('checklist');
            list.innerHTML = config.map(t => `
                <div id="row-${t.id}" class="bg-slate-900 border border-slate-800 p-4 rounded-2xl flex items-center justify-between">
                    <div>
                        <span class="text-sm font-bold text-slate-300">${t.label}</span>
                        <div id="st-${t.id}" class="text-[9px] text-slate-600 font-bold uppercase mt-1">Pendente</div>
                    </div>
                    <div class="flex gap-2">
                        <button id="view-${t.id}" onclick="openPreview('${t.id}')" class="hidden bg-slate-800 p-3 rounded-xl">👁️</button>
                        <button onclick="startCapture('${t.id}')" class="bg-blue-600 text-white p-3 rounded-xl">📸</button>
                    </div>
                </div>
            `).join('');
            model = await mobilenet.load();
        }
        init();

        function checkStep1() {
            if(document.getElementById('tomador').value.length < 3) return alert("Nome do Tomador Inválido");
            nextStep(2);
        }

        function nextStep(s) {
            document.querySelectorAll('.step').forEach(e => e.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
        }

        async function startCapture(id) {
            current = config.find(t => t.id === id);
            document.getElementById('camLabel').innerText = current.label;
            document.getElementById('cameraOverlay').style.display = 'flex';
            
            const core = document.getElementById('btnCore');
            const instr = document.getElementById('instructionText');
            
            if(current.isVideo) {
                core.className = "w-10 h-10 bg-red-600 rounded-md transition-all";
                instr.innerText = "Toque para iniciar Gravação";
            } else {
                core.className = "w-14 h-14 bg-slate-200 rounded-full transition-all";
                instr.innerText = "Toque para capturar Foto";
            }

            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: current.isVideo 
                });
                const videoElement = document.getElementById('webcam');
                videoElement.srcObject = stream;
                
                // Botão habilitado imediatamente após stream ativo
                document.getElementById('actionBtn').disabled = false;
                analyze();
            } catch (err) {
                alert("Erro ao acessar câmera: " + err);
            }
        }

        async function analyze() {
            if(!stream || !model) return;
            try {
                const predictions = await model.classify(document.getElementById('webcam'));
                const status = document.getElementById('aiStatus');
                if(predictions[0].probability > 0.15) {
                    status.innerText = "Foco: " + predictions[0].className.split(',')[0];
                    status.className = "text-[10px] text-green-400 font-bold uppercase tracking-widest";
                }
            } catch (e) {}
            if(stream) requestAnimationFrame(analyze);
        }

        function handleAction() {
            if(current.isVideo) {
                if(recorder && recorder.state === "recording") {
                    stopRec();
                } else {
                    startRec();
                }
            } else {
                snap();
            }
        }

        function snap() {
            const v = document.getElementById('webcam');
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            data[current.id] = {type: 'img', src: c.toDataURL('image/jpeg', 0.8)};
            finish();
        }

        function startRec() {
            chunks = [];
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                data[current.id] = {type: 'vid', src: URL.createObjectURL(blob)};
                finish();
            };
            recorder.start();
            
            document.getElementById('btnCore').classList.add('recording');
            document.getElementById('timer').classList.remove('hidden');
            document.getElementById('instructionText').innerText = "Gravando... Toque para Parar";
            
            let sec = 0;
            timerInterval = setInterval(() => {
                sec++;
                const m = String(Math.floor(sec / 60)).padStart(2, '0');
                const s = String(sec % 60).padStart(2, '0');
                document.getElementById('timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        function stopRec() {
            recorder.stop();
            clearInterval(timerInterval);
            document.getElementById('btnCore').classList.remove('recording');
            document.getElementById('timer').classList.add('hidden');
            document.getElementById('timer').innerText = "00:00";
        }

        function finish() {
            const row = document.getElementById('row-' + current.id);
            row.className = "bg-green-500/10 border border-green-500/50 p-4 rounded-2xl flex items-center justify-between";
            document.getElementById('st-' + current.id).innerText = "✓ Concluído";
            document.getElementById('st-' + current.id).className = "text-[9px] text-green-500 font-bold uppercase mt-1";
            document.getElementById('view-' + current.id).classList.remove('hidden');
            closeCam();
            prog();
        }

        function prog() {
            const count = Object.keys(data).length;
            document.getElementById('progressBar').style.width = (count * 10) + '%';
            document.getElementById('counter').innerText = `${count}/10`;
            if(count === 10) document.getElementById('submitArea').classList.remove('hidden');
        }

        function openPreview(id) {
            const item = data[id];
            const content = document.getElementById('previewContent');
            content.innerHTML = item.type === 'vid' 
                ? `<video src="${item.src}" controls autoplay class="max-h-full"></video>` 
                : `<img src="${item.src}" class="max-h-full object-contain">`;
            document.getElementById('previewModal').style.display = 'flex';
        }

        function closePreview() {
            document.getElementById('previewContent').innerHTML = "";
            document.getElementById('previewModal').style.display = 'none';
        }

        function closeCam() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            stream = null;
            document.getElementById('cameraOverlay').style.display = 'none';
        }

        function renderReview() {
            const grid = document.getElementById('reviewGrid');
            grid.innerHTML = config.map(t => `
                <div onclick="openPreview('${t.id}')" class="bg-slate-900 aspect-video rounded-lg overflow-hidden border border-slate-800 flex items-center justify-center">
                    ${data[t.id].type === 'vid' ? '<span class="text-2xl">🎥</span>' : `<img src="${data[t.id].src}" class="w-full h-full object-cover">`}
                </div>
            `).join('');
            nextStep(3);
        }
    </script>
</body>
</html>
